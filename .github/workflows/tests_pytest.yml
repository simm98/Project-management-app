name: CI with Docker Compose

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Create .env file
        run: |
          mkdir -p .env
          echo "POSTGRES_USER=admin" >> .env/.env
          echo "POSTGRES_PASSWORD=root123" >> .env/.env
          echo "POSTGRES_DB=postgres" >> .env/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run tests only
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up --build --exit-code-from test


      - name: Wait for Postgres to be ready
        run: |
          until docker exec database-PostgreSQL pg_isready -U admin; do
            echo "Waiting for Postgres..."
            sleep 5
          done

      - name: Run tests inside container
        run: |
          docker exec project-management-app pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: true

      - name: Shut down services
        if: always()
        run: docker compose -f docker-compose.yml down

