version: "3.9"

services:
  test:
    build: .
    env_file: .env/.env
    container_name: project-management-tests
    environment:
      - PYTHONPATH=/app
    command: pytest tests -s --cov=app --cov-report=xml:coverage/coverage.xml
    volumes:
        - ./coverage:/app/coverage
    depends_on:
      - db
