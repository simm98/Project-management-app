name: CI with Docker Compose

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Create .env file
        run: |
          mkdir -p .env
          echo "POSTGRES_USER=admin" >> .env/.env
          echo "POSTGRES_PASSWORD=root123" >> .env/.env
          echo "POSTGRES_DB=postgres" >> .env/.env
          echo AWS_REGION = "us-east-1" >> .env/.env
          echo S3_BUCKET_NAME = "tf-s3-bucket" >> .env/.env
          echo DATABASE_URL = "postgresql://admin:root123@db:5432/postgres" >> .env/.env
          echo UPLOAD_DIR = '/uploads' >> .env/.env
          echo SECRET_KEY = "supersecretkey" >> .env/.env
          echo ALGORITHM = "HS256" >> .env/.env
          echo ACCESS_TOKEN_EXPIRE_MINUTES = 60 >> .env/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start services
        run: |
          docker compose -f docker-compose.yml up -d --build

      - name: Wait for Postgres to be ready
        run: |
          until docker exec database-PostgreSQL pg_isready -U admin; do
            echo "Waiting for Postgres..."
            sleep 5
          done

      - name: Run tests inside container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up --build --exit-code-from test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage.xml
          fail_ci_if_error: true

      - name: Shut down services
        if: always()
        run: docker compose -f docker-compose.yml down

