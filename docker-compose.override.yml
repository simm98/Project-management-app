version: "3.9"

services:
  test:
    build: .
    env_file: .env/.env
    container_name: project-management-tests
    environment:
      - PYTHONPATH=/app
    command: pytest tests -s --cov=app --cov-report=term-missing --cov-report=xml
    volumes:
        - ./coverage.xml:/app/coverage.xml
    depends_on:
      - db
